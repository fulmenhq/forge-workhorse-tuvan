# goneat Tools Configuration (v1.0.0)
# Repository: forge-workhorse-tuvan
#
# This file is the SINGLE SOURCE OF TRUTH for tools configuration.
# There are NO hidden defaults or runtime merging.
#
# Edit this file to:
# - Add/remove tools
# - Change tool detection commands
# - Modify installer priorities
# - Define custom scopes
#
# Validate changes with: goneat doctor tools validate
# See schema: schemas/tools/tools.v1.0.0.json
scopes:
  foundation:
    description: Core foundation tools required for goneat and TypeScript development
    tools:
      - actionlint
      - ripgrep
      - jq
      - yq
      - bun
      - yamlfmt
      - prettier
tools:
  prettier:
    name: prettier
    # NOTE: prettier is in the foundation scope because it is our ONLY Markdown
    # formatter. biome is path/scope-limited to JS/TS/JSON and does not format
    # Markdown. `goneat format --types markdown` shells out to prettier, so the
    # CI quality-gate cannot pass without it provisioned during bootstrap.
    description: Markdown formatter (foundation scope — our only Markdown formatter)
    kind: node
    detect_command: prettier --version
    version_args:
      - --version
    installer_priority:
      darwin:
        - bun
        - npm
        - brew
      linux:
        - bun
        - npm
      windows:
        - bun
        - npm
    version_scheme: semver
    minimum_version: "3.0.0"
    recommended_version: "3.8.0"
  actionlint:
    name: actionlint
    description: GitHub Actions workflow linter
    kind: system
    detect_command: actionlint -version
    platforms:
      - darwin
      - linux
      - windows
    version_args:
      - -version
    check_args:
      - -help
    installer_priority:
      darwin:
        - brew
        - bun
      linux:
        - brew
        - bun
      windows:
        - scoop
        - winget
  jq:
    name: jq
    description: JSON processor - used in CI/CD scripts
    kind: system
    detect_command: jq --version
    platforms:
      - darwin
      - linux
      - windows
    installer_priority:
      darwin:
        - brew
        - bun
        - mise
      linux:
        - brew
        - bun
        - mise
      windows:
        - bun
        - scoop
        - winget
  ripgrep:
    name: ripgrep
    description: Fast text search - used by goneat for license auditing
    kind: system
    detect_command: rg --version
    platforms:
      - darwin
      - linux
      - windows
    installer_priority:
      darwin:
        - brew
        - bun
        - mise
      linux:
        - brew
        - bun
        - mise
      windows:
        - bun
        - scoop
        - winget
  bun:
    name: bun
    description: Fast JavaScript runtime and package manager - required for Tuvan development
    kind: system
    detect_command: bun --version
    platforms:
      - darwin
      - linux
      - windows
    version_args:
      - --version
    installer_priority:
      darwin:
        - brew
        - mise
      linux:
        - brew
        - mise
      windows:
        - scoop
        - winget
    version_scheme: semver
    minimum_version: 1.0.0
  yamlfmt:
    name: yamlfmt
    description: YAML formatter and linter
    kind: system
    detect_command: yamlfmt --version
    platforms:
      - darwin
      - linux
      - windows
    version_args:
      - --version
    check_args:
      - --help
    installer_priority:
      darwin:
        - brew
        - bun
      linux:
        - brew
        - bun
      windows:
        - scoop
  yq:
    name: yq
    description: YAML processor
    kind: system
    detect_command: yq --version
    platforms:
      - darwin
      - linux
      - windows
    installer_priority:
      darwin:
        - brew
        - bun
        - mise
      linux:
        - brew
        - bun
        - mise
      windows:
        - bun
        - scoop
        - winget
