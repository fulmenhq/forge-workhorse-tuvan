version: v1
# License Compliance Policy
licenses:
  # Explicitly allowed licenses (Permissive)
  allow:
    - MIT
    - Apache-2.0
    - BSD-3-Clause
    - BSD-2-Clause
    - ISC
    - 0BSD
    - Unlicense
    - CC0-1.0
  # Explicitly forbidden licenses (Copyleft/Viral)
  forbidden:
    - GPL-3.0
    - AGPL-3.0
    - LGPL-3.0
    - MPL-2.0
    - EPL-2.0
# Language settings
languages:
  - language: typescript
    paths:
      - package.json
